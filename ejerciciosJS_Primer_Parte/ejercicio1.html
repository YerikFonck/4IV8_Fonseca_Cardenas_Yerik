<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital invertido</title>
    <script src="./JS/Ejercicio1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/styles.css">
</head>
<body>
    <h1>Ejercicio 1</h1>
    <form name="formulario1" method="post" id="formulario1" onsubmit="return calcularCapital(this);">
                <label for="capital">
                    capital a invertir
                    <br>
                    (Cantidades entre $1000 y $500000)
                    <br>
                    <input type="number" name="capital" id="capital" placeholder="Por favor ingrese el monto a invertir">
                </label>
                <br>

                <label for="meses">
                    meses a calcular
                    <br>
                    <select name="meses" id="meses">
                        <option value="">seleccione un plazo</option>
                        <option value=1>1 mes</option>
                        <option value="3">3 meses</option>
                        <option value="6">6 meses</option>
                        <option value="9">9 meses</option>
                        <option value="12">12 meses</option>
                        <option value="15">15 meses</option>
                        <option value="24">24 meses</option>
                    </select>
                </label>
                <br>

                <input type="submit" name="enviar" id="enviar" value="enviar">
                <input type="reset" name="borrar" id="borrar" value="borrar">

            </form>
            <h2 id = "resultado"></h2>
            <a href="./menu.html">volver al menu</a>
</body>
</html>
