<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1>Ejercicio 4</h1>

                <label for="cal1">
                    Calificaciones departamentales 55%
                    <br>
                    <input type="number" step="0.1" name="cal1" id="cal1" placeholder="Por favor ingrese la primera calificacion">
                </label>
                <br>

                <label for="cal2">
                    <br>
                    <input type="number" step="0.1" name="cal2" id="cal2" placeholder="Por favor ingrese la segunda calificacion">
                </label>
                <br>

                <label for="cal3">
                    
                    <br>
                    <input type="number" step="0.1" name="cal3" id="cal3" placeholder="Por favor ingrese la tercera calificacion">
                </label>
                <br>

                <label for="examen">
                    Examen Final 35%
                    <br>
                    <input type="number" step="0.1" name="examen" id="examen" placeholder="Por favor ingrese su calificacion">
                </label>
                <br>

                <label for="TrabajoFinal">
                    Trabajo final 15%
                    <br>
                    <input type="number" step="0.1" name="TrabajoFinal" id="TrabajoFinal" placeholder="Por favor ingrese su calificacion">
                </label>

            </form>
